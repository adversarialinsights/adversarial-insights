---
layout: default
---
<article class="post">
  <header class="post-header card">
    <p class="eyebrow">Adversarial Insights Blog</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    {% if page.hero_image %}
      <img class="post-hero" src="{{ page.hero_image | relative_url }}" alt="{{ page.title }}" />
    {% endif %}
  </header>

  <div class="post-content card prose">
    {{ content }}
  </div>
</article>
