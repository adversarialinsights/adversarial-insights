<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="container nav-wrap">
          <a class="brand" href="{{ '/' | relative_url }}">
            <img src="{{ '/assets/images/adversarial-insights-logo-web-320.png' | relative_url }}" alt="Adversarial Insights logo" class="brand-logo">
            <span class="brand-text">Adversarial Insights</span>
          </a>
          <nav class="nav">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/services/' | relative_url }}">Services</a>
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
            <a href="{{ '/contact/' | relative_url }}">Contact</a>
            <a class="nav-cta" href="{{ '/contact/' | relative_url }}">Request Assessment</a>
          </nav>
        </div>
      </header>

      <main>
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <p>Strategic security insight from the attacker’s perspective.</p>
        </div>
        <div class="footer-bottom">
          <div class="container">
            <p>© 2026 Adversarial Insights LLC. All rights reserved.</p>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
