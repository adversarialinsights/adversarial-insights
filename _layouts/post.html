---
layout: default
---
<article class="post" style="width: min(1100px, calc(100% - 2rem)); margin: 0 auto; padding: 3rem 0;">
  <header class="post-header card" style="width: 100%; margin-bottom: 1.5rem;">
    <p class="eyebrow">Adversarial Insights Blog</p>
    <h1>{{ page.title }}</h1>

    {% if page.date %}
      <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    {% endif %}

    {% if page.hero_image %}
      <img
        class="post-hero"
        src="{{ page.hero_image | relative_url }}"
        alt="{{ page.hero_alt | default: page.title }}"
      />
    {% endif %}

    {% if page.youtube_id %}
      <div
        class="video-container post-video"
        style="position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 18px; margin-top: 1.5rem; border: 1px solid rgba(125,211,252,.12); box-shadow: 0 18px 50px rgba(0,0,0,.28); background: rgba(0,0,0,.25);"
      >
        <iframe
          src="https://www.youtube.com/embed/{{ page.youtube_id }}"
          title="{{ page.youtube_title | default: page.title }}"
          style="position: absolute; inset: 0; width: 100%; height: 100%; border: 0;"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    {% endif %}
  </header>

  <div class="post-content card prose" style="width: 100%;">
    {{ content }}
  </div>
</article>
